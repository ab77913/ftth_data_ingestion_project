worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Allow large ZIP/KMZ/Excel uploads (up to 500 MB)
    client_max_body_size 500M;

    # Increase timeouts for long-running agent processing
    proxy_read_timeout    3600s;
    proxy_connect_timeout 60s;
    proxy_send_timeout    3600s;

    upstream ftth_backend {
        server 127.0.0.1:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # Gzip compression for API responses
        gzip on;
        gzip_types application/json text/plain text/css application/javascript;
        gzip_min_length 1000;

        location / {
            proxy_pass         http://ftth_backend;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Required for SSE (Server-Sent Events) — agent progress streams
            proxy_set_header   Connection        '';
            proxy_buffering    off;
            proxy_cache        off;
            chunked_transfer_encoding on;
        }
    }
}
